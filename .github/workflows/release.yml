name: Release

on:
  push:
    tags: ["v*"]              # só dispara para tags tipo v0.1.0

permissions:
  contents: write             # autoriza o workflow a criar o Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Testes
        run: cargo test       # nunca lançar algo que quebrou

      - name: Build otimizado
        run: cargo build --release

      - name: Empacotar versão portátil
        run: Compress-Archive -Path target/release/lumen-stream.exe -DestinationPath lumen-stream-windows.zip

      - name: Gerar instalador (Inno Setup)
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")   # tag v1.0.0 -> 1.0.0
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss

      - name: Publicar Release
        uses: softprops/action-gh-release@v2   # cria o Release e anexa os arquivos
        with:
          files: |
            dist/LumenStream-Setup-*.exe
            lumen-stream-windows.zip
